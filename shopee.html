<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Tạo Mã Sản Phẩm Nhúng</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #ee4d2d; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #f0f0f0; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #ee4d2d; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .grid-item-form { border: 1px dashed #ee4d2d; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #fffaf9; }
        .btn { background: #ee4d2d; color: #fff; border: none; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px; }
        .btn:hover { background: #d73211; }
        .btn-copy { background: #28a745; margin-top: 20px; }
        .btn-copy:hover { background: #218838; }
        .output-section { margin-top: 30px; }
        .output-section textarea { width: 100%; height: 200px; font-family: monospace; font-size: 13px; background: #2d2d2d; color: #00ff00; padding: 15px; border-radius: 5px; }
        .preview-section { margin-top: 30px; border: 1px solid #ddd; padding: 20px; border-radius: 10px; background: #fafafa; }
        .preview-title { font-weight: bold; margin-bottom: 15px; color: #555; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .row { display: flex; gap: 20px; }
        .col { flex: 1; }
        /* Tùy chỉnh riêng cho checkbox */
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .checkbox-group input { width: auto; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Công Cụ Tạo Mã Nhúng Sản Phẩm</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('single')">1. Box Sản Phẩm Đơn</button>
        <button class="tab-btn" onclick="switchTab('grid')">2. Danh Sách Sản Phẩm (Grid)</button>
        <button class="tab-btn" onclick="switchTab('shopee_detail')">3. Giao diện Chi tiết Shopee</button>
    </div>

    <!-- TAB 1 & 2 (GIỮ NGUYÊN) -->
    <div id="single" class="tab-content active">
        <div class="row">
            <div class="col">
                <div class="form-group"><label>Link Shopee (Affiliate):</label><input type="text" id="s_link" value="https://s.shopee.vn/8V3W53G6MB"></div>
                <div class="form-group"><label>Link Hình Ảnh (Image URL):</label><input type="text" id="s_img" value="https://manluxury.vn/wp-content/uploads/2024/08/image-28.png"></div>
                <div class="form-group"><label>Tên Sản Phẩm:</label><input type="text" id="s_name" value="Giày Sneaker Unisex LEOnerva 808 VS2"></div>
                <div class="form-group"><label>Thông tin Đánh Giá:</label><input type="text" id="s_rating" value="⭐ 4.9 | 1.2k Đánh Giá | Đã bán 10k+"></div>
            </div>
            <div class="col">
                <div class="form-group"><label>Giá Mới:</label><input type="text" id="s_price_new" value="480.000₫ - 490.000₫"></div>
                <div class="form-group"><label>Giá Cũ:</label><input type="text" id="s_price_old" value="550.000₫"></div>
                <div class="form-group"><label>Phần trăm giảm:</label><input type="text" id="s_discount" value="-13%"></div>
                <div class="form-group"><label>Phân loại:</label><input type="text" id="s_variants" value="Màu: Đế Nâu | Trắng Đen | Xanh Lá <br> Size: 36 - 45"></div>
            </div>
        </div>
        <button class="btn" onclick="generateSingle()">TẠO CODE SẢN PHẨM ĐƠN</button>
    </div>

    <div id="grid" class="tab-content">
        <div class="form-group" style="max-width: 300px;"><label>Số lượng sản phẩm:</label><input type="number" id="grid_count" value="4" min="1" max="20" onchange="renderGridForms()"></div>
        <div id="grid_forms_container" class="row" style="flex-wrap: wrap;"></div>
        <button class="btn" onclick="generateGrid()">TẠO CODE DANH SÁCH (GRID)</button>
    </div>

    <!-- TAB 3: CHỈ SỬA PHẦN THỜI GIAN VÒNG LẶP -->
    <div id="shopee_detail" class="tab-content">
        <div class="row">
            <div class="col">
                <div class="form-group"><label>Link Shopee (Affiliate):</label><input type="text" id="sh_link" value="https://s.shopee.vn/8V3W53G6MB"></div>
                <div class="form-group"><label>Link Hình Ảnh chính:</label><input type="text" id="sh_img" value="https://down-vn.img.susercontent.com/file/vn-11134207-7ras8-m1p1p1p1p1p1p1"></div>
                <div class="form-group"><label>Tên Sản Phẩm:</label><input type="text" id="sh_name" value="[CHỐNG NẮNG WATERGEL MỚI] Kem Chống Nắng Phổ Rộng Thoáng Da UV Defender SPF 50+"></div>
                <div class="form-group"><label>Đánh giá & Đã bán:</label><input type="text" id="sh_stats" value="4.9 ⭐ | 156,3k Đánh Giá | Đã bán 500k+"></div>
            </div>
            <div class="col">
                <!-- PHẦN SỬA DUY NHẤT: BẬT/TẮT VÒNG LẶP -->
                <div class="checkbox-group">
                    <input type="checkbox" id="sh_flash_loop_enable" checked>
                    <label for="sh_flash_loop_enable">Bật vòng lặp đếm ngược Flash Sale</label>
                </div>
                <div class="form-group">
                    <label>Thời gian vòng lặp (Số phút):</label>
                    <input type="number" id="sh_flash_minutes" value="120" placeholder="Ví dụ: 120 phút">
                </div>
                
                <div class="form-group"><label>Giá bán hiện tại:</label><input type="text" id="sh_price" value="299.000₫"></div>
                <div class="form-group"><label>Giá sau Voucher:</label><input type="text" id="sh_price_v" value="289.000₫"></div>
                <div class="form-group"><label>Các mã giảm giá (Dùng | ):</label><input type="text" id="sh_vouchers" value="Giảm 20k | Giảm 10k | Giảm 35k"></div>
                <div class="form-group"><label>Phân loại (Dùng | ):</label><input type="text" id="sh_variants" value="UV Aquafusion | Invisible Resist | Matte & Fresh"></div>
            </div>
        </div>
        <button class="btn" onclick="generateShopeeDetail()">TẠO CODE CHI TIẾT SHOPEE</button>
    </div>

    <div class="output-section">
        <button class="btn btn-copy" onclick="copyCode()">📋 COPY CODE HTML</button>
        <textarea id="result_code" readonly></textarea>
    </div>

    <div class="preview-section">
        <div class="preview-title">👁️ Xem Trước Giao Diện (Preview)</div>
        <div id="preview_area"></div>
    </div>
</div>

<script>
    // GIỮ NGUYÊN CODE CŨ
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    const cssSingle = `\n<style>\n.ngoc-product-box { max-width: 900px; margin: 20px auto; font-family: Arial, sans-serif; }\n.ngoc-product-card { display: flex; gap: 20px; border: 1px solid #eee; border-radius: 10px; padding: 15px; transition: 0.3s; background: #fff; }\n.ngoc-product-card:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.1); transform: translateY(-3px); }\n.ngoc-product-image img { width: 260px; border-radius: 8px; }\n.ngoc-product-info { flex: 1; }\n.ngoc-product-info h3 { font-size: 20px; margin-bottom: 8px; color: #222; }\n.ngoc-rating { color: #ff9900; font-size: 14px; margin-bottom: 10px; }\n.price-new { font-size: 22px; font-weight: bold; color: #ee4d2d; margin-right: 10px; }\n.price-old { text-decoration: line-through; color: #888; margin-right: 8px; }\n.discount { background: #ee4d2d; color: #fff; padding: 2px 6px; font-size: 12px; border-radius: 4px; }\n.ngoc-variants { font-size: 14px; color: #555; margin-bottom: 15px; }\n.ngoc-button { display: inline-block; background: #ee4d2d; color: #fff; padding: 10px 20px; border-radius: 6px; font-weight: bold; transition: 0.3s; }\n.ngoc-product-card a { text-decoration: none; color: inherit; }\n@media (max-width: 768px) { .ngoc-product-card { flex-direction: column; text-align: center; } .ngoc-product-image img { width: 100%; } }\n</style>`;
    const cssGrid = `\n<style>\n.ngoc-grid-wrapper { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin: 20px 0; font-family: Arial, sans-serif; }\n.ngoc-product-item { border: 1px solid #eee; border-radius: 10px; padding: 12px; background: #fff; position: relative; transition: 0.3s; }\n.ngoc-product-item img { width: 100%; border-radius: 8px; }\n.new-price { color: #ee4d2d; font-weight: bold; }\n.old-price { text-decoration: line-through; color: #888; font-size: 13px; margin-left: 6px; }\n.ngoc-badge { position: absolute; top: 10px; left: 10px; background: #ee4d2d; color: #fff; font-size: 12px; padding: 3px 6px; border-radius: 4px; }\n.ngoc-product-item a { text-decoration: none; color: inherit; }\n</style>`;
    
    const cssShopeeDetail = `
<style>
.sh-detail-box { max-width: 850px; margin: 20px auto; font-family: -apple-system, Helvetica Neue, Helvetica, Roboto, Arial; background: #fff; border-radius: 4px; overflow: hidden; border: 1px solid #f0f0f0; }
.sh-detail-flex { display: flex; padding: 20px; gap: 20px; }
.sh-detail-img { width: 350px; flex-shrink: 0; }
.sh-detail-img img { width: 100%; border-radius: 2px; }
.sh-detail-content { flex: 1; }
.sh-mall-tag { background: #d0011b; color: #fff; font-size: 12px; padding: 2px 4px; border-radius: 2px; font-weight: bold; margin-right: 5px; }
.sh-name { font-size: 20px; font-weight: 500; line-height: 24px; margin-bottom: 10px; color: #000; }
.sh-stats-row { font-size: 14px; color: #757575; margin-bottom: 15px; display: flex; gap: 15px; }
.sh-flash-bar { background: #ee4d2d; background-image: linear-gradient(270deg,#ff5b37,#ee4d2d); color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
.sh-price-area { background: #fafafa; padding: 15px; margin-bottom: 15px; }
.sh-main-price { color: #ee4d2d; font-size: 30px; font-weight: 500; }
.sh-voucher-price { color: #ee4d2d; font-size: 13px; margin-top: 5px; background: #ffebee; display: inline-block; padding: 2px 8px; border-radius: 2px; }
.sh-section { display: flex; margin-bottom: 15px; align-items: flex-start; }
.sh-label { width: 110px; color: #757575; font-size: 14px; flex-shrink: 0; }
.sh-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.sh-tag { border: 1px solid #ee4d2d; color: #ee4d2d; padding: 2px 8px; font-size: 12px; background: #fff5f5; border-radius: 2px; }
.sh-variant { border: 1px solid rgba(0,0,0,.09); padding: 6px 12px; font-size: 14px; border-radius: 2px; background: #fff; }
.sh-btn-group { display: flex; gap: 12px; margin-top: 20px; }
.sh-btn-cart { border: 1px solid #ee4d2d; color: #ee4d2d; background: rgba(255,87,34,.1); flex: 1; padding: 12px; text-align: center; font-weight: 500; border-radius: 2px; cursor: pointer; text-decoration: none; }
.sh-btn-buy { background: #ee4d2d; color: #fff; flex: 1.5; padding: 12px; text-align: center; font-weight: 500; border-radius: 2px; cursor: pointer; text-decoration: none; }
@media (max-width: 768px) { .sh-detail-flex { flex-direction: column; } .sh-detail-img { width: 100%; } }
</style>`;

    function renderGridForms() {
        const count = document.getElementById('grid_count').value;
        const container = document.getElementById('grid_forms_container');
        container.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            container.innerHTML += `<div class="col" style="min-width: 300px;"><div class="grid-item-form"><h4 style="margin-top:0; color:#ee4d2d;">Sản phẩm ${i}</h4><div class="form-group"><input type="text" id="g_link_${i}" placeholder="Link Shopee" value="https://s.shopee.vn/8V3W53G6MB"></div><div class="form-group"><input type="text" id="g_badge_${i}" placeholder="Badge" value="Yêu thích"></div><div class="form-group"><input type="text" id="g_img_${i}" placeholder="Link Ảnh" value="https://manluxury.vn/wp-content/uploads/2024/08/Sneaker-Unisex-LEOnerva-808.webp"></div><div class="form-group"><input type="text" id="g_name_${i}" placeholder="Tên sản phẩm" value="LEOnerva 808 Mẫu ${i}"></div><div class="form-group"><input type="text" id="g_price_new_${i}" placeholder="Giá mới" value="480.000₫"></div><div class="form-group"><input type="text" id="g_price_old_${i}" placeholder="Giá cũ" value="550.000₫"></div><div class="form-group"><input type="text" id="g_rating_${i}" placeholder="Đánh giá" value="⭐ 4.9 | Đã bán 10k+"></div></div></div>`;
        }
    }
    renderGridForms();

    function generateSingle() {
        const html = `<div class="ngoc-product-box"><a href="${document.getElementById('s_link').value}" target="_blank"><div class="ngoc-product-card"><div class="ngoc-product-image"><img src="${document.getElementById('s_img').value}"></div><div class="ngoc-product-info"><h3>${document.getElementById('s_name').value}</h3><div class="ngoc-rating">${document.getElementById('s_rating').value}</div><div class="ngoc-price"><span class="price-new">${document.getElementById('s_price_new').value}</span><span class="price-old">${document.getElementById('s_price_old').value}</span><span class="discount">${document.getElementById('s_discount').value}</span></div><div class="ngoc-variants">${document.getElementById('s_variants').value}</div><div class="ngoc-button">Mua Ngay Trên Shopee</div></div></div></a></div>`;
        document.getElementById('result_code').value = html + cssSingle;
        document.getElementById('preview_area').innerHTML = html + cssSingle;
    }

    function generateGrid() {
        let itemsHtml = '';
        for (let i = 1; i <= document.getElementById('grid_count').value; i++) {
            itemsHtml += `<div class="ngoc-product-item"><a href="${document.getElementById(`g_link_${i}`).value}" target="_blank"><div class="ngoc-badge">${document.getElementById(`g_badge_${i}`).value}</div><img src="${document.getElementById(`g_img_${i}`).value}"><h3>${document.getElementById(`g_name_${i}`).value}</h3><div class="ngoc-price"><span class="new-price">${document.getElementById(`g_price_new_${i}`).value}</span><span class="old-price">${document.getElementById(`g_price_old_${i}`).value}</span></div><div class="ngoc-rating">${document.getElementById(`g_rating_${i}`).value}</div></a></div>`;
        }
        const final = `<div class="ngoc-grid-wrapper">${itemsHtml}</div>` + cssGrid;
        document.getElementById('result_code').value = final;
        document.getElementById('preview_area').innerHTML = final;
    }

    // PHẦN SỬA DUY NHẤT: LOGIC TẠO MÃ CÓ VÒNG LẶP THỜI GIAN
    function generateShopeeDetail() {
        const isLoop = document.getElementById('sh_flash_loop_enable').checked;
        const minutes = document.getElementById('sh_flash_minutes').value || 120;
        const idBox = 'sh_' + Math.random().toString(36).substr(2, 9); // Tạo ID ngẫu nhiên để tránh trùng lặp

        let flashHtml = `<span>⚡ FLASH SALE</span>`;
        let scriptHtml = '';

        if(isLoop) {
            flashHtml += `<span id="timer_${idBox}">KẾT THÚC TRONG --:--:--</span>`;
            scriptHtml = `
<script>
(function(){
    var targetTime = new Date().getTime() + ${minutes} * 60000;
    function updateTimer() {
        var now = new Date().getTime();
        var diff = targetTime - now;
        if (diff <= 0) { targetTime = new Date().getTime() + ${minutes} * 60000; diff = ${minutes} * 60000; }
        var h = Math.floor(diff / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        document.getElementById('timer_${idBox}').innerHTML = "KẾT THÚC TRONG " + (h<10?'0':'')+h + ":" + (m<10?'0':'')+m + ":" + (s<10?'0':'')+s;
    }
    setInterval(updateTimer, 1000); updateTimer();
})();
<\/script>`;
        } else {
            flashHtml += `<span>KẾT THÚC TRONG 00:00:00</span>`;
        }

        const vouchers = document.getElementById('sh_vouchers').value.split('|').map(v => `<span class="sh-tag">${v.trim()}</span>`).join('');
        const variants = document.getElementById('sh_variants').value.split('|').map(v => `<span class="sh-variant">${v.trim()}</span>`).join('');

        const html = `
<div class="sh-detail-box" id="${idBox}">
    <div class="sh-flash-bar">${flashHtml}</div>
    <div class="sh-detail-flex">
        <div class="sh-detail-img"><img src="${document.getElementById('sh_img').value}"></div>
        <div class="sh-detail-content">
            <div class="sh-name"><span class="sh-mall-tag">Mall</span>${document.getElementById('sh_name').value}</div>
            <div class="sh-stats-row">${document.getElementById('sh_stats').value}</div>
            <div class="sh-price-area">
                <div class="sh-main-price">${document.getElementById('sh_price').value}</div>
                <div class="sh-voucher-price">💰 ${document.getElementById('sh_price_v').value} Giá Sau Voucher</div>
            </div>
            <div class="sh-section"><div class="sh-label">Mã Giảm Giá</div><div class="sh-tags">${vouchers}</div></div>
            <div class="sh-section"><div class="sh-label">Phân Loại</div><div class="sh-tags">${variants}</div></div>
            <div class="sh-btn-group">
                <a href="${document.getElementById('sh_link').value}" class="sh-btn-cart" target="_blank">Thêm Vào Giỏ Hàng</a>
                <a href="${document.getElementById('sh_link').value}" class="sh-btn-buy" target="_blank">Mua Với Voucher</a>
            </div>
        </div>
    </div>
</div>${scriptHtml}`;

        document.getElementById('result_code').value = html + cssShopeeDetail;
        document.getElementById('preview_area').innerHTML = html + cssShopeeDetail;
    }

    function copyCode() {
        const code = document.getElementById('result_code');
        code.select();
        navigator.clipboard.writeText(code.value);
        alert("Đã copy thành công!");
    }
</script>
</body>
</html>
