<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Tính Công Suất Đèn Năng Lượng Mặt Trời</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
       .calculator-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 25px;
        }
       .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        select {
            cursor: pointer;
        }
       .result-container {
            margin-top: 30px;
            padding: 20px;
            background-color: #e9f5ff;
            border-radius: 8px;
            text-align: center;
            border-left: 5px solid #007bff;
        }
       .result-label {
            font-size: 16px;
            color: #0056b3;
            margin: 0;
        }
       .result-value {
            font-size: 28px;
            font-weight: 700;
            color: #004a99;
            margin: 5px 0 0 0;
        }
       .formula-note {
            font-size: 12px;
            color: #777;
            text-align: center;
            margin-top: 25px;
        }
       .option-description {
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>Công Cụ Tính Công Suất Đèn Năng Lượng Mặt Trời</h2>

    <div class="input-group">
        <label for="lumens">Nhập Tổng Quang Thông (Lumen)</label>
        <input type="number" id="lumens" placeholder="Ví dụ: 5000" min="0" oninput="calculatePower()">
    </div>

    <div class="input-group">
        <label for="efficacy">Chọn Cấp Hiệu Suất Phát Quang Của Hệ Thống Đèn</label>
        <select id="efficacy" onchange="calculatePower()">
            <option value="105">
                Cấp 1: Phổ thông / Tiêu dùng (90 - 120 lm/W)
            </option>
            <option value="140" selected>
                Cấp 2: Thương mại / Tiêu chuẩn (121 - 160 lm/W)
            </option>
            <option value="180">
                Cấp 3: Hiệu suất cao / Cao cấp (161 - 200+ lm/W)
            </option>
        </select>
    </div>

    <div class="result-container">
        <p class="result-label">Công Suất Tối Đa Ước Tính:</p>
        <p class="result-value"><span id="result">0.00</span> Watt</p>
    </div>

    <p class="formula-note">
        Công thức: Công suất (Watt) = Quang thông (Lumen) / Hiệu suất phát quang (lm/W)
    </p>
</div>

<script>
    function calculatePower() {
        const lumens = parseFloat(document.getElementById('lumens').value);
        const efficacy = parseFloat(document.getElementById('efficacy').value);
        const resultElement = document.getElementById('result');

        if (isNaN(lumens) |

| lumens <= 0) {
            resultElement.textContent = "0.00";
            return;
        }

        if (isNaN(efficacy) |

| efficacy <= 0) {
            resultElement.textContent = "N/A";
            return;
        }

        const watts = lumens / efficacy;
        resultElement.textContent = watts.toFixed(2);
    }

    // Initial calculation on page load
    window.onload = calculatePower;
</script>

</body>
</html>
